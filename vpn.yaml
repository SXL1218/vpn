port: 7890
socks-port: 7891
mixed-port: 7892
allow-lan: true
mode: rule
log-level: info

# ===== DNS（关键）=====
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-filter:
    - "*.openai.com"
    - "*.chatgpt.com"
  nameserver:
    - 1.1.1.1
    - 8.8.8.8

# ===== TUN（可开，但已优化）=====
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - any:53

# ===== 节点组 =====
proxy-groups:
  - name: PROXY
    type: select
    proxies:
      - 你的节点1
      - 你的节点2

  - name: GPT
    type: select
    proxies:
      - 你的节点1
      - 你的节点2
      - DIRECT

  - name: Cursor
    type: select
    proxies:
      - PROXY
      - 你的节点1

# ===== 规则 =====
rules:
  # ===== OpenAI / GPT =====
  - DOMAIN-SUFFIX,openai.com,GPT
  - DOMAIN-SUFFIX,chatgpt.com,GPT
  - DOMAIN-SUFFIX,oaistatic.com,GPT
  - DOMAIN-SUFFIX,oaiusercontent.com,GPT
  - DOMAIN-SUFFIX,openaiapi-site.azureedge.net,GPT
  - DOMAIN-SUFFIX,api.openai.com,GPT

  # ===== Cursor =====
  - DOMAIN-SUFFIX,cursor.sh,Cursor

  # ===== GitHub =====
  - DOMAIN-SUFFIX,github.com,Cursor
  - DOMAIN-SUFFIX,githubusercontent.com,Cursor
  - DOMAIN-SUFFIX,githubassets.com,Cursor
  - DOMAIN-SUFFIX,github.dev,Cursor

  # ===== Google =====
  - DOMAIN-SUFFIX,google.com,Cursor
  - DOMAIN-SUFFIX,gstatic.com,Cursor
  - DOMAIN-SUFFIX,googleapis.com,Cursor

  # ===== 其他 AI =====
  - DOMAIN-SUFFIX,anthropic.com,PROXY
  - DOMAIN-SUFFIX,claude.ai,PROXY

  # ===== 国内直连 =====
  - GEOIP,CN,DIRECT

  # ===== 兜底 =====
  - MATCH,DIRECT